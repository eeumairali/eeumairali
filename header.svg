<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" fill="none" role="img" aria-label="Umair Ali - Precision Cattle Monitoring">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#15201a"/>
    </linearGradient>
    <linearGradient id="grn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ddc84"/>
      <stop offset="1" stop-color="#2E8B57"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="200" rx="14" fill="url(#bg)"/>

  <!-- scanning detection box sweeping across, like a live inference feed -->
  <g opacity="0.9">
    <rect x="40" y="55" width="120" height="90" rx="6" stroke="url(#grn)" stroke-width="2" stroke-dasharray="6 4">
      <animate attributeName="x" values="40;560;40" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="44" y="48" font-family="JetBrains Mono, monospace" font-size="11" fill="#3ddc84">
      <tspan>cow 0.98</tspan>
      <animate attributeName="x" values="44;564;44" dur="6s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- mini neural net: input -> backbone -> 3 heads -->
  <g stroke="url(#grn)" stroke-width="1.4" opacity="0.55">
    <line x1="240" y1="100" x2="330" y2="60"/><line x1="240" y1="100" x2="330" y2="100"/><line x1="240" y1="100" x2="330" y2="140"/>
    <line x1="330" y1="60" x2="430" y2="55"/><line x1="330" y1="100" x2="430" y2="100"/><line x1="330" y1="140" x2="430" y2="145"/>
  </g>
  <g fill="#3ddc84" filter="url(#glow)">
    <circle cx="240" cy="100" r="6"><animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="60" r="5"/><circle cx="330" cy="100" r="5"/><circle cx="330" cy="140" r="5"/>
    <circle cx="430" cy="55" r="5"/><circle cx="430" cy="100" r="5"/><circle cx="430" cy="145" r="5"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#8b9a92">
    <text x="455" y="59">Detection</text>
    <text x="455" y="104">Re-ID</text>
    <text x="455" y="149">Behavior</text>
  </g>

  <!-- title -->
  <text x="40" y="178" font-family="JetBrains Mono, monospace" font-size="13" fill="#e6edf3" opacity="0">
    Umair Ali · one backbone, three tasks
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.2;0.8;1" dur="6s" repeatCount="indefinite"/>
  </text>
</svg>
